<!DOCTYPE html>
<html>
<head>
  <title>market.com</title>
</head>
</html>

<style>
    body {
      font-family: Arial;
      background: #f5f5f5;
    }

    .header {
      background: purple;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 5px rgba(0,0,0,0.2);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: contain;
    }

    .price {
      color: purple;
      font-weight: bold;
    }

    button {
      background: purple;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: darkviolet;
    }
  </style>

<body>
  
  <div class="header">Vegetable Store</div>
  <div class="container">
    
    <div class="card">
      <img src="fresh-vegetables-carrot-500x500.jpg">
      <h3>Carrot 500G</h3>
      <p class="price">Rs.350</p>
      <button onclick="addToCard('Carrot')">+ Add</button>
    </div>
    
    <div class="card">
      <img src="images.jpeg">
      <h3 class="onion">onion 500G</h3>
      <p class="price">Rs.150</p>
      <button onclick="addToCard('onion'">+ Add</button>
    </div>
    <div class="card">
      <img src="istockphoto-1251666784-612x612.jpg">
      <h3 class="Beetroot">Beetroot 500G</h3>
      <p class="price">Rs.250</p>
      <button onclick="addToCard('Beetroot'">+ Add</button>
    </div>
    <div class="card">
      <img src="Untitled-design-2023-03-19T140324.048.jpg">
      <h3 class="Brinjal">Brinjal 500G</h3>
      <p class="price">Rs.180</p> 
      <button onclick="addToCard">+ Add</button>
    </div>
  </div>   
</body>
